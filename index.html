<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Family 100 DIY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>FAMILY 100</h1>
            <div class="nav-buttons">
                <button id="btn-play-mode" class="active">Mode Main</button>
                <button id="btn-edit-mode">Edit Survei ⚙️</button>
            </div>
        </header>

        <main id="play-screen">
            <div class="game-header">
                <div class="round-control">
                    <button id="btn-prev-question">◀ Kiri</button>
                    <span id="question-number">Pertanyaan 1 / 1</span>
                    <button id="btn-next-question">Kanan ▶</button>
                </div>
                <div class="score-board">
                    <span>Skor: <strong id="total-score">0</strong></span>
                </div>
            </div>

            <div class="question-box">
                <h2 id="display-question">Loading Pertanyaan...</h2>
            </div>

            <div class="board-grid" id="board-grid">
                </div>

            <div class="action-panel">
                <div class="input-group">
                    <input type="text" id="guess-input" placeholder="Ketik jawabanmu di sini..." autocomplete="off">
                    <button id="btn-submit-guess">Jawab!</button>
                </div>
                <div class="strike-container" id="strike-container">
                    </div>
            </div>
            
            <div class="reset-panel">
                <button id="btn-reset-round" class="btn-secondary">Reset Babak Ini</button>
            </div>
        </main>

        <section id="edit-screen" class="hidden">
            <h2>Kelola Pertanyaan & Jawaban</h2>
            <p class="instruction">Kamu bisa menambah, mengubah, atau menghapus survei di bawah ini. Semua data tersimpan aman di browser ini.</p>
            
            <div class="editor-container">
                <div class="survey-list" id="survey-list">
                    </div>
                
                <div class="survey-form-container">
                    <h3 id="form-title">Tambah Pertanyaan Baru</h3>
                    <form id="survey-form">
                        <input type="hidden" id="edit-index" value="-1">
                        <div class="form-group">
                            <label for="input-question">Pertanyaan:</label>
                            <input type="text" id="input-question" required placeholder="Contoh: Apa yang ada di dalam kulkas?">
                        </div>
                        
                        <div class="answers-inputs">
                            <label>Jawaban & Poin (Urutkan dari poin terbesar ke terkecil):</label>
                            <div class="answer-row">
                                <input type="text" class="ans-text" placeholder="Jawaban 1 (Paling populer)" required>
                                <input type="number" class="ans-points" placeholder="Poin" required min="1" max="100">
                            </div>
                            <div class="answer-row">
                                <input type="text" class="ans-text" placeholder="Jawaban 2">
                                <input type="number" class="ans-points" placeholder="Poin" min="1" max="100">
                            </div>
                            <div class="answer-row">
                                <input type="text" class="ans-text" placeholder="Jawaban 3">
                                <input type="number" class="ans-points" placeholder="Poin" min="1" max="100">
                            </div>
                            <div class="answer-row">
                                <input type="text" class="ans-text" placeholder="Jawaban 4">
                                <input type="number" class="ans-points" placeholder="Poin" min="1" max="100">
                            </div>
                            <div class="answer-row">
                                <input type="text" class="ans-text" placeholder="Jawaban 5">
                                <input type="number" class="ans-points" placeholder="Poin" min="1" max="100">
                            </div>
                            <div class="answer-row">
                                <input type="text" class="ans-text" placeholder="Jawaban 6">
                                <input type="number" class="ans-points" placeholder="Poin" min="1" max="100">
                            </div>
                            <div class="answer-row">
                                <input type="text" class="ans-text" placeholder="Jawaban 7">
                                <input type="number" class="ans-points" placeholder="Poin" min="1" max="100">
                            </div>
                            <div class="answer-row">
                                <input type="text" class="ans-text" placeholder="Jawaban 8">
                                <input type="number" class="ans-points" placeholder="Poin" min="1" max="100">
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" id="btn-save-survey">Simpan</button>
                            <button type="button" id="btn-cancel-edit" class="btn-secondary">Batal</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="reset-data-container">
                <button id="btn-restore-defaults" class="btn-danger">Kembalikan ke Soal Bawaan (Reset Semua)</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
